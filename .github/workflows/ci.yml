name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ECE_LLM_MODE: mock
      ECE_STORAGE_BACKEND: memory
      ECE_VECTOR_BACKEND: memory
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Project check
        run: python scripts/check_project.py

      - name: Ruff F-level check
        run: python -m ruff check app scripts tests --select F

      - name: Generate sample docs
        run: python scripts/create_sample_docs.py

      - name: Generate GitLab fixtures
        run: python scripts/create_gitlab_fixture_docs.py

      - name: Sample eval smoke test
        run: python scripts/run_eval.py --source sample_docs

      - name: GitLab eval smoke test
        run: python scripts/run_eval.py --source gitlab_handbook

      - name: Pytest
        run: python -m pytest
